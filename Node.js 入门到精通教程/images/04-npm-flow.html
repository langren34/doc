<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>npm 包管理流程</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 980px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.6; }
</style>
<main>
  <svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
    <text x="400" y="28" text-anchor="middle" class="title">npm 包管理流程</text>

    <!-- Registry -->
    <rect x="40" y="70" width="160" height="80" rx="10" class="zone" />
    <text x="120" y="92" text-anchor="middle" class="label">npm Registry</text>
    <rect x="70" y="105" width="100" height="36" rx="6" class="node external" />
    <text x="120" y="127" text-anchor="middle" class="label">210万+ 包</text>

    <!-- Local project -->
    <rect x="280" y="60" width="480" height="300" rx="12" class="zone" />
    <text x="520" y="82" text-anchor="middle" class="label">本地项目</text>

    <rect x="320" y="105" width="120" height="46" rx="8" class="node input" />
    <text x="380" y="128" text-anchor="middle" class="label">安装依赖</text>
    <text x="380" y="144" text-anchor="middle" class="small">npm install pkg</text>

    <rect x="480" y="105" width="120" height="46" rx="8" class="node input" />
    <text x="540" y="128" text-anchor="middle" class="label">更新依赖</text>
    <text x="540" y="144" text-anchor="middle" class="small">npm update pkg</text>

    <rect x="640" y="105" width="100" height="46" rx="8" class="node input" />
    <text x="690" y="128" text-anchor="middle" class="label">运行脚本</text>
    <text x="690" y="144" text-anchor="middle" class="small">npm run dev</text>

    <rect x="320" y="190" width="180" height="46" rx="8" class="node process" />
    <text x="410" y="213" text-anchor="middle" class="label">package.json 记录依赖</text>
    <text x="410" y="229" text-anchor="middle" class="small">dependencies / devDependencies</text>

    <rect x="540" y="190" width="160" height="46" rx="8" class="node process" />
    <text x="620" y="213" text-anchor="middle" class="label">lockfile 锁定版本</text>
    <text x="620" y="229" text-anchor="middle" class="small">package-lock.json</text>

    <rect x="360" y="275" width="140" height="46" rx="8" class="node storage" />
    <text x="430" y="298" text-anchor="middle" class="label">生产部署</text>
    <text x="430" y="314" text-anchor="middle" class="small">npm ci（严格锁定）</text>

    <rect x="560" y="275" width="120" height="46" rx="8" class="node storage" />
    <text x="620" y="298" text-anchor="middle" class="label">安全检查</text>
    <text x="620" y="314" text-anchor="middle" class="small">npm audit</text>

    <!-- Arrows -->
    <line x1="200" y1="113" x2="320" y2="113" class="edge" marker-end="url(#arrow)" />
    <line x1="380" y1="151" x2="380" y2="190" class="edge" marker-end="url(#arrow)" />
    <line x1="540" y1="151" x2="540" y2="190" class="edge" marker-end="url(#arrow)" />
    <line x1="620" y1="236" x2="620" y2="275" class="edge" marker-end="url(#arrow)" />
    <line x1="500" y1="236" x2="500" y2="252" class="edge" />
    <line x1="500" y1="252" x2="430" y2="275" class="edge" marker-end="url(#arrow)" />

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="var(--line)" />
      </marker>
    </defs>
  </svg>
</main>

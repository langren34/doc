<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">
  <style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 980px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .title {
    font-size: 20px;
    font-weight: 650;
    fill: var(--fg);
  }
  .label {
    font-size: 14px;
    font-weight: 600;
    fill: var(--fg);
  }
  .small {
    font-size: 12px;
    fill: var(--muted);
  }
  .node {
    stroke: var(--line);
    stroke-width: 1;
  }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge {
    stroke: var(--line);
    stroke-width: 1.5;
    fill: none;
  }
  .zone {
    fill: none;
    stroke: var(--line);
    stroke-width: 1;
    stroke-dasharray: 6 5;
    opacity: 0.8;
  }
</style>
    <text x="400" y="32" text-anchor="middle" class="title">Node.js 应用场景地图</text>

    <!-- Center -->
    <circle cx="400" cy="260" r="70" class="node process" />
    <text x="400" y="256" text-anchor="middle" class="label">Node.js</text>
    <text x="400" y="274" text-anchor="middle" class="small">JavaScript 运行时</text>

    <!-- Nodes around center -->
    <g>
      <rect x="340" y="60" width="120" height="56" rx="8" class="node input" />
      <text x="400" y="92" text-anchor="middle" class="label">Web API</text>
      <text x="400" y="108" text-anchor="middle" class="small">Express / Fastify</text>
    </g>

    <g>
      <rect x="620" y="160" width="140" height="56" rx="8" class="node external" />
      <text x="690" y="192" text-anchor="middle" class="label">实时应用</text>
      <text x="690" y="208" text-anchor="middle" class="small">聊天 / 协作 / IoT</text>
    </g>

    <g>
      <rect x="620" y="340" width="140" height="56" rx="8" class="node storage" />
      <text x="690" y="372" text-anchor="middle" class="label">微服务</text>
      <text x="690" y="388" text-anchor="middle" class="small">轻量 / 快速启动</text>
    </g>

    <g>
      <rect x="340" y="400" width="120" height="56" rx="8" class="node input" />
      <text x="400" y="432" text-anchor="middle" class="label">命令行工具</text>
      <text x="400" y="448" text-anchor="middle" class="small">脚本 / CLI</text>
    </g>

    <g>
      <rect x="60" y="340" width="140" height="56" rx="8" class="node external" />
      <text x="130" y="372" text-anchor="middle" class="label">构建工具链</text>
      <text x="130" y="388" text-anchor="middle" class="small">Webpack / Vite</text>
    </g>

    <g>
      <rect x="60" y="160" width="140" height="56" rx="8" class="node storage" />
      <text x="130" y="192" text-anchor="middle" class="label">桌面应用</text>
      <text x="130" y="208" text-anchor="middle" class="small">Electron / 跨平台</text>
    </g>

    <!-- Edges -->
    <line x1="400" y1="116" x2="400" y2="190" class="edge" marker-end="url(#arrow)" />
    <line x1="620" y1="188" x2="460" y2="240" class="edge" marker-end="url(#arrow)" />
    <line x1="620" y1="368" x2="460" y2="290" class="edge" marker-end="url(#arrow)" />
    <line x1="400" y1="400" x2="400" y2="330" class="edge" marker-end="url(#arrow)" />
    <line x1="200" y1="368" x2="340" y2="290" class="edge" marker-end="url(#arrow)" />
    <line x1="200" y1="188" x2="340" y2="240" class="edge" marker-end="url(#arrow)" />

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="var(--line)" />
      </marker>
    </defs>
  </svg>
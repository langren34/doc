<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 980px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .dashed { stroke: var(--line); stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
</style>
    <text x="400" y="28" text-anchor="middle" class="title">Node.js Event Loop 简化流程</text>

    <!-- Phases -->
    <rect x="80" y="70" width="120" height="46" rx="8" class="node input" />
    <text x="140" y="98" text-anchor="middle" class="label">timers</text>

    <rect x="250" y="70" width="120" height="46" rx="8" class="node process" />
    <text x="310" y="98" text-anchor="middle" class="label">pending callbacks</text>

    <rect x="420" y="70" width="120" height="46" rx="8" class="node process" />
    <text x="480" y="98" text-anchor="middle" class="label">poll（I/O）</text>

    <rect x="590" y="70" width="120" height="46" rx="8" class="node storage" />
    <text x="650" y="98" text-anchor="middle" class="label">check</text>

    <rect x="590" y="150" width="120" height="46" rx="8" class="node storage" />
    <text x="650" y="178" text-anchor="middle" class="label">close callbacks</text>

    <!-- Arrows between phases -->
    <line x1="200" y1="93" x2="250" y2="93" class="edge" marker-end="url(#arrow)" />
    <line x1="370" y1="93" x2="420" y2="93" class="edge" marker-end="url(#arrow)" />
    <line x1="540" y1="93" x2="590" y2="93" class="edge" marker-end="url(#arrow)" />
    <line x1="650" y1="116" x2="650" y2="150" class="edge" marker-end="url(#arrow)" />

    <!-- Loop back -->
    <path d="M 650 196 L 650 240 L 140 240 L 140 116" class="dashed" marker-end="url(#arrow)" />

    <!-- I/O offload -->
    <rect x="280" y="170" width="160" height="56" rx="8" class="node external" />
    <text x="360" y="196" text-anchor="middle" class="label">系统内核处理 I/O</text>
    <text x="360" y="214" text-anchor="middle" class="small">文件 / 网络 / 数据库</text>

    <line x1="480" y1="93" x2="420" y2="170" class="edge" marker-end="url(#arrow)" />
    <line x1="360" y1="170" x2="360" y2="116" class="edge" marker-end="url(#arrow)" style="display:none;" />

    <!-- microtask note -->
    <rect x="80" y="300" width="640" height="60" rx="8" class="node neutral" />
    <text x="400" y="325" text-anchor="middle" class="label">实用口诀：I/O 操作交给内核，主线程继续处理其他任务，完成后回调进入 Event Loop</text>
    <text x="400" y="347" text-anchor="middle" class="small">不要写阻塞代码（大循环、大量同步计算），否则会卡住整个事件循环</text>

    <!-- I/O to poll arrow -->
    <path d="M 360 226 L 360 250 L 480 250 L 480 116" class="dashed" marker-end="url(#arrow)" />

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="var(--line)" />
      </marker>
    </defs>
  </svg>
<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 980px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.6; }
</style>
    <text x="400" y="28" text-anchor="middle" class="title">Node.js HTTP 请求处理流程</text>

    <!-- Client zone -->
    <rect x="40" y="60" width="140" height="80" rx="8" class="zone" />
    <text x="110" y="82" text-anchor="middle" class="label">客户端</text>
    <rect x="70" y="95" width="80" height="36" rx="6" class="node external" />
    <text x="110" y="117" text-anchor="middle" class="label">Browser / curl</text>

    <!-- Server zone -->
    <rect x="240" y="60" width="520" height="300" rx="12" class="zone" />
    <text x="500" y="82" text-anchor="middle" class="label">Node.js 服务器</text>

    <rect x="280" y="105" width="140" height="50" rx="8" class="node input" />
    <text x="350" y="128" text-anchor="middle" class="label">创建服务器</text>
    <text x="350" y="144" text-anchor="middle" class="small">http.createServer()</text>

    <rect x="460" y="105" width="140" height="50" rx="8" class="node input" />
    <text x="530" y="128" text-anchor="middle" class="label">监听端口</text>
    <text x="530" y="144" text-anchor="middle" class="small">server.listen(3000)</text>

    <rect x="280" y="190" width="140" height="50" rx="8" class="node process" />
    <text x="350" y="213" text-anchor="middle" class="label">请求到达</text>
    <text x="350" y="229" text-anchor="middle" class="small">req.method / req.url</text>

    <rect x="460" y="190" width="140" height="50" rx="8" class="node process" />
    <text x="530" y="213" text-anchor="middle" class="label">读取请求体</text>
    <text x="530" y="229" text-anchor="middle" class="small">req.on('data')</text>

    <rect x="280" y="275" width="140" height="50" rx="8" class="node storage" />
    <text x="350" y="298" text-anchor="middle" class="label">处理业务逻辑</text>
    <text x="350" y="314" text-anchor="middle" class="small">查库 / 计算</text>

    <rect x="460" y="275" width="140" height="50" rx="8" class="node storage" />
    <text x="530" y="298" text-anchor="middle" class="label">发送响应</text>
    <text x="530" y="314" text-anchor="middle" class="small">res.end() / JSON</text>

    <!-- Arrows -->
    <line x1="180" y1="113" x2="280" y2="113" class="edge" marker-end="url(#arrow)" />
    <line x1="420" y1="130" x2="460" y2="130" class="edge" marker-end="url(#arrow)" />
    <line x1="350" y1="155" x2="350" y2="190" class="edge" marker-end="url(#arrow)" />
    <line x1="420" y1="215" x2="460" y2="215" class="edge" marker-end="url(#arrow)" />
    <line x1="530" y1="240" x2="530" y2="275" class="edge" marker-end="url(#arrow)" />
    <line x1="420" y1="300" x2="460" y2="300" class="edge" marker-end="url(#arrow)" />

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="var(--line)" />
      </marker>
    </defs>
  </svg>
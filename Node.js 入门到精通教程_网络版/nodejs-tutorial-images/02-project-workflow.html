<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Node.js 项目从零到运行</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    max-width: 980px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .dashed { stroke: var(--line); stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
</style>
<main>
  <svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
    <text x="400" y="28" text-anchor="middle" class="title">Node.js 项目：从零到运行</text>

    <!-- Steps -->
    <rect x="40" y="70" width="120" height="52" rx="8" class="node input" />
    <text x="100" y="96" text-anchor="middle" class="label">1. 安装 Node.js</text>
    <text x="100" y="112" text-anchor="middle" class="small">node -v 检查版本</text>

    <rect x="200" y="70" width="120" height="52" rx="8" class="node input" />
    <text x="260" y="96" text-anchor="middle" class="label">2. 初始化项目</text>
    <text x="260" y="112" text-anchor="middle" class="small">npm init -y</text>

    <rect x="360" y="70" width="120" height="52" rx="8" class="node input" />
    <text x="420" y="96" text-anchor="middle" class="label">3. 安装依赖</text>
    <text x="420" y="112" text-anchor="middle" class="small">npm install express</text>

    <rect x="520" y="70" width="120" height="52" rx="8" class="node process" />
    <text x="580" y="96" text-anchor="middle" class="label">4. 编写代码</text>
    <text x="580" y="112" text-anchor="middle" class="small">app.js / server.js</text>

    <rect x="680" y="70" width="120" height="52" rx="8" class="node storage" />
    <text x="740" y="96" text-anchor="middle" class="label">5. 运行项目</text>
    <text x="740" y="112" text-anchor="middle" class="small">node app.js</text>

    <!-- Arrows -->
    <line x1="160" y1="96" x2="200" y2="96" class="edge" marker-end="url(#arrow)" />
    <line x1="320" y1="96" x2="360" y2="96" class="edge" marker-end="url(#arrow)" />
    <line x1="480" y1="96" x2="520" y2="96" class="edge" marker-end="url(#arrow)" />
    <line x1="640" y1="96" x2="680" y2="96" class="edge" marker-end="url(#arrow)" />

    <!-- Dev loop below -->
    <rect x="240" y="180" width="140" height="52" rx="8" class="node external" />
    <text x="310" y="206" text-anchor="middle" class="label">开发调试</text>
    <text x="310" y="222" text-anchor="middle" class="small">node --watch + console.log</text>

    <rect x="440" y="180" width="140" height="52" rx="8" class="node external" />
    <text x="510" y="206" text-anchor="middle" class="label">运行测试</text>
    <text x="510" y="222" text-anchor="middle" class="small">node --test</text>

    <rect x="640" y="180" width="120" height="52" rx="8" class="node external" />
    <text x="700" y="206" text-anchor="middle" class="label">部署上线</text>
    <text x="700" y="222" text-anchor="middle" class="small">Cloud / Docker</text>

    <line x1="380" y1="206" x2="440" y2="206" class="edge" marker-end="url(#arrow)" />
    <line x1="580" y1="206" x2="640" y2="206" class="edge" marker-end="url(#arrow)" />

    <!-- Loop back -->
    <path d="M 740 122 L 740 160 L 700 160 L 700 180" class="dashed" fill="none" />
    <path d="M 310 232 L 310 260 L 580 260 L 580 232" class="dashed" fill="none" marker-end="url(#arrow)" />

    <!-- Files produced -->
    <rect x="80" y="260" width="120" height="44" rx="6" class="node neutral" />
    <text x="140" y="286" text-anchor="middle" class="label">package.json</text>
    <rect x="240" y="260" width="120" height="44" rx="6" class="node neutral" />
    <text x="300" y="286" text-anchor="middle" class="label">node_modules</text>

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="var(--line)" />
      </marker>
    </defs>
  </svg>
</main>
